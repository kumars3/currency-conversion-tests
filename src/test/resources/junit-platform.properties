# JUnit Platform Configuration
# ----------------------------
# Controls execution behaviour of JUnit + Cucumber engine.
#
# cucumber.glue -> packages containing step definitions and hooks
# cucumber.plugin -> reporting plugins
# cucumber.execution.parallel.enabled -> enable/disable parallel execution
#
# Note:
# This file is used by the JUnit Platform when running tests via Maven.

cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=3