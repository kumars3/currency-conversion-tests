# Application Configuration
# -------------------------
# app.url -> XE converter URL
# browser -> default browser (chromium/firefox/webkit)
# exchange.rate.provider -> mock or xe
# xe.validation.enabled -> enable/disable API validation
# trace/video/screenshot -> artifact settings

app.url=https://www.xe.com/
browser=chromium
headless=true
xe.base.url=https://xecdapi.xe.com

trace.enabled=true
video.enabled=true
screenshot.on.failure=true

exchange.rate.provider=mock
xe.validation.enabled=true
