# Extent Report Configuration
# ---------------------------
# Controls reporting behaviour for Extent Reports.
#
# spark reporter -> HTML report generation
# output path -> where report is generated
# view order -> order of tabs in report UI
#
# Note:
# Used by Extent Cucumber adapter during test execution.

extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/ExtentReport.html

screenshot.dir=target/extent-reports/screenshots/
screenshot.rel.path=screenshots/

basefolder.name=extent-reports
basefolder.datetimepattern=dd-MMM-yyyy-HH-mm-ss